name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------------
      # Checkout repository
      # -----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------------------
      # Build Docker images
      # -----------------------------------
      - name: Build Docker Images
        run: docker compose build