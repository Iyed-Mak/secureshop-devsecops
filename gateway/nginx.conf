events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # JWT validation
    map $http_authorization $jwt_token {
        default "";
        "~^Bearer (.+)$" $1;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check
        location /health {
            access_log off;
            return 200 '{"status": "ok", "gateway": "nginx"}';
            add_header Content-Type application/json;
        }

        # User service routes
        location /api/user {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://user-service:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/users {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://user-service:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Product service routes (some require auth)
        location /api/product {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://product-service:8002/products/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/products {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://product-service:8002/products/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Order service routes (require auth)
        location /api/order {
            limit_req zone=api burst=10 nodelay;

            # JWT validation for protected routes
            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://order-service:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/orders {
            limit_req zone=api burst=10 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://order-service:8003/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Payment service routes (require auth)
        location /api/payment {
            limit_req zone=api burst=5 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://payment-service:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/payments {
            limit_req zone=api burst=5 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://payment-service:8004/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Notification service routes (require auth)
        location /api/notification {
            limit_req zone=api burst=5 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://notification-service:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/notifications {
            limit_req zone=api burst=5 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://notification-service:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Inventory service routes (require auth)
        location /api/inventory {
            limit_req zone=api burst=10 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://inventory-service:8006/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/inventories {
            limit_req zone=api burst=10 nodelay;

            if ($http_authorization = "") {
                return 401 '{"error": "Authorization header required"}';
                add_header Content-Type application/json;
            }

            proxy_pass http://inventory-service:8006/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Root health check and default location
        location = / {
            add_header Content-Type application/json;
            return 200 '{"status": "ok", "gateway": "nginx"}';
        }

        location / {
            add_header Content-Type application/json;
            return 404 '{"error": "Not Found"}';
        }
    }
}
